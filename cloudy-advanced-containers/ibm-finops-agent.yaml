global:
  clusterId: $clustername
  federatedStorage:
    existingSecret: federated-store
agent:
  cloudability:
    enabled: true
    secret:
      cloudabilityAccessKey: $public_key
      cloudabilitySecretKey: $private key
      cloudabilityEnvId: $environmentID
      create: true
    uploadRegion: us-west-2
    parseMetricData: false
  collectorDataSource:
    enabled: true
    retention10m: 6
    retention1d: 2
    retention1h: 3
    scrapeInterval: 30s
  exporter:
    emissionInterval: 1m