global:
  clusterId: $clustername
  federatedStorage:
    existingSecret: federated-store
resources:
  requests:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 50Mi
  limits:
#It is common to increase the memory limit to guarantee avail and data integrity. Want to avoid OOMs.
#See sizing guide at: https://github.com/kubecost/kubecost/releases/tag/v3.1.4
    cpu: 2
    memory: 2048Mi
    ephemeral-storage: 2Gi
agent:
  cloudability:
    enabled: true
    secret:
      cloudabilityAccessKey: $public_key
      cloudabilitySecretKey: $private key
      cloudabilityEnvId: $environmentID
      create: true
    uploadRegion: us-west-2
    parseMetricData: false
  collectorDataSource:
    enabled: true
    retention10m: 6
    retention1d: 2
    retention1h: 3
    scrapeInterval: 30s
  exporter:
    emissionInterval: 1m
